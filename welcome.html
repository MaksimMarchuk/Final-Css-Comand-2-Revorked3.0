<body>
    <main class="welcome-main">
        <a href="./index.html" class="welcome-back"><i class="bi bi-backspace"></i></a>        
        <div class="welcome-main-text-div">
            <img src="./src/img/welcome-logo-img.webp" alt="logo">
            <h1>WELCOME!</h1>
            <h3>RESRRVE YOUR SWEET MOMENT</h3>
        </div>
        <div class="welcome-img-div">
            <img src="./src/img/welcome-main-img.webp" alt="img">
        </div>
        <div class="welcome-info-main-div">
            <div class="info-card-div">
                <h3>TABLE RESERVATION</h3>
                <div class="welcome-input-div">
                    <form>
                        <label for="start" class="date-label"> <img src="./src/img/welcome-date-img.webp" alt="">
                            <input type="date" id="start" name="trip-start" value="2026-04-26" class="date-input">
                        </label>

                        <label class="time-label"> <img src="./src/img/welcome-time-img.webp" alt="">
                            <input type="time" class="time-input">
                        </label>

                        <label class="table-label"> <img src="/src/img/welcome-table-img.webp" alt="">
                            <select class="table-input">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </label>

                        <label>
                            <button type="submit" class="welcome-form-btn">RESERVE</button>
                        </label>
                    </form>
                    <img src="./src/img/MainIcecream-desktop.webp" alt="" class="welcome-img">
                </div>
            </div>
        </div>
    </main>
</body>
